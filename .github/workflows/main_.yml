# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Update last_modified_atl
  update-timestamps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # required to compare against previous commit

      - name: Update last_modified_at
        run: |
          # Format current time as ISO 8601 with colon in timezone offset (e.g. +02:00)
          NOW=$(date +"%Y-%m-%dT%H:%M:%S%z" | sed 's/\([+-][0-9][0-9]\)\([0-9][0-9]\)$/\1:\2/')

          # Get list of changed .md files in district/ or region/ only
          CHANGED_MD=$(git diff --name-only HEAD~1 HEAD | grep '\.md$' | grep -E '^(district|region)/' || true)

          if [ -z "$CHANGED_MD" ]; then
            echo "No .md changes found in district/ or region/, skipping."
            exit 0
          fi

          # Collect all unique directories that need .html updates.
          # For each changed .md, bubble up through every parent directory.
          # Example: region/city/*/apartment/_posts/file.md
          #   → region/city/*/apartment/
          #   → region/city/*/
          #   → region/city/
          #   → region/
          declare -A DIRS_TO_UPDATE

          while IFS= read -r file; do
            dir=$(dirname "$file")
            # Walk up the directory tree until we reach the repo root
            while [[ "$dir" != "." ]]; do
              DIRS_TO_UPDATE["$dir"]=1
              dir=$(dirname "$dir")
            done
          done <<< "$CHANGED_MD"

          # Update all *.html files in each collected directory (non-recursive)
          for dir in "${!DIRS_TO_UPDATE[@]}"; do
            html_files=$(find "$dir" -maxdepth 1 -name "*.html")
            if [ -n "$html_files" ]; then
              echo "📁 Updating $dir/*.html..."
              echo "$html_files" | xargs sed -i "s|^last_modified_at:.*|last_modified_at: $NOW|"
            fi
          done

          # Always update root index.html if any .md changed in district/ or region/
          echo "📄 Updating index.html..."
          sed -i "s|^last_modified_at:.*|last_modified_at: $NOW|" index.html

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # [skip ci] prevents this commit from triggering the workflow again
          git diff --staged --quiet || git commit -m "chore: update last_modified_at [skip ci]"
          git push

  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Update exchange rates in _config.yml
        run: |
          CURRENT_USD=$(grep '^usd:' _config.yml | awk '{print $2}')
          CURRENT_EUR=$(grep '^eur:' _config.yml | awk '{print $2}')
          CURRENT_NBU=$(grep '^nbu:' _config.yml | awk '{print $2}')
          USD="" EUR="" NBU=""

          echo "Отримуємо офіційний курс НБУ..."
          NBU_DATA=$(curl -sf --max-time 10 "https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json" || echo "")
          if [ -n "$NBU_DATA" ]; then
            NBU=$(echo "$NBU_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r['rate'],4)) for r in data if r['cc']=='USD']" 2>/dev/null | head -1)
            echo "✅ НБУ офіційний: NBU=$NBU"
          else
            NBU="$CURRENT_NBU"
            echo "⚠️ НБУ недоступний, залишаємо NBU=$NBU"
          fi

          echo "Спроба PrivatBank (курс продажу)..."
          PRIVAT_DATA=$(curl -sf --max-time 10 "https://api.privatbank.ua/p24api/pubinfo?exchange&coursid=5" || echo "")
          if [ -n "$PRIVAT_DATA" ]; then
            USD=$(echo "$PRIVAT_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(float(r['sale']),2)) for r in data if r['ccy']=='USD']" 2>/dev/null | head -1)
            EUR=$(echo "$PRIVAT_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(float(r['sale']),2)) for r in data if r['ccy']=='EUR']" 2>/dev/null | head -1)
            echo "✅ PrivatBank: USD=$USD EUR=$EUR"
          fi

          if [ -z "$USD" ] || [ -z "$EUR" ]; then
            echo "PrivatBank недоступний. Спроба Monobank (курс продажу)..."
            MONO_DATA=$(curl -sf --max-time 10 "https://api.monobank.ua/bank/currency" || echo "")
            if [ -n "$MONO_DATA" ]; then
              USD=$(echo "$MONO_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r.get('rateSell',r.get('rateCross',0)),2)) for r in data if r.get('currencyCodeA')==840 and r.get('currencyCodeB')==980]" 2>/dev/null | head -1)
              EUR=$(echo "$MONO_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r.get('rateSell',r.get('rateCross',0)),2)) for r in data if r.get('currencyCodeA')==978 and r.get('currencyCodeB')==980]" 2>/dev/null | head -1)
              echo "✅ Monobank: USD=$USD EUR=$EUR"
            fi
          fi

          if [ -z "$USD" ] || [ -z "$EUR" ]; then
            echo "⚠️ PrivatBank і Monobank недоступні. Використовуємо НБУ для usd/eur..."
            if [ -n "$NBU_DATA" ]; then
              USD=$(echo "$NBU_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r['rate'],2)) for r in data if r['cc']=='USD']" 2>/dev/null | head -1)
              EUR=$(echo "$NBU_DATA" | python3 -c "import sys,json; data=json.load(sys.stdin); [print(round(r['rate'],2)) for r in data if r['cc']=='EUR']" 2>/dev/null | head -1)
              echo "✅ НБУ fallback: USD=$USD EUR=$EUR"
            fi
          fi

          if [ -z "$USD" ] || [ -z "$EUR" ]; then
            echo "⚠️ Всі API недоступні! Залишаємо поточні: USD=$CURRENT_USD EUR=$CURRENT_EUR"
            USD="$CURRENT_USD"
            EUR="$CURRENT_EUR"
          fi

          sed -i "s/^usd: .*/usd: $USD/" _config.yml
          sed -i "s/^eur: .*/eur: $EUR/" _config.yml
          sed -i "s/^nbu: .*/nbu: $NBU/" _config.yml
          echo "✅ _config.yml оновлено: USD=$USD EUR=$EUR NBU=$NBU"

      - name: Set stats API token
        run: |
          if [ -n "${{ secrets.STATS_API_TOKEN }}" ]; then
            sed -i "s/^stats_api_token: .*/stats_api_token: ${{ secrets.STATS_API_TOKEN }}/" _config.yml
            echo "✅ Stats API token встановлено"
          else
            echo "⚠️ STATS_API_TOKEN не задано — графік статистики не працюватиме"
          fi

      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.207.0
        # uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      #- uses: actions/cache@v4
      #  with:
      #    path: vendor/bundle
      #    key: ${{ runner.os }}-jekyll-${{ hashFiles('**/Gemfile.lock') }}
      #    restore-keys: |
      #      ${{ runner.os }}-jekyll-
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v4

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
